services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: corfumania
      POSTGRES_USER: corfumania
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - corfumania_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corfumania -d corfumania"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://corfumania:${POSTGRES_PASSWORD}@db:5432/corfumania?schema=public
      JWT_SECRET: ${JWT_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
      NEXT_PUBLIC_ENABLE_PWA: ${NEXT_PUBLIC_ENABLE_PWA:-false}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"

volumes:
  corfumania_db:

