services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: corfumania
      POSTGRES_USER: corfumania
      POSTGRES_PASSWORD: corfumania
    volumes:
      - corfumania_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corfumania -d corfumania"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "55432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://corfumania:corfumania@db:5432/corfumania?schema=public
      JWT_SECRET: change-me-in-prod
      SESSION_TTL_SECONDS: 28800
      NEXT_PUBLIC_ENABLE_PWA: "false"
      APP_ORIGIN: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  corfumania_db:
