services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  app:
    environment:
      NEXT_PUBLIC_ENABLE_PWA: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      APP_ORIGIN: https://${DOMAIN}
      DATABASE_URL: postgresql://corfumania:${POSTGRES_PASSWORD}@db:5432/corfumania?schema=public
      JWT_SECRET: ${JWT_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}

volumes:
  caddy_data:
  caddy_config:
